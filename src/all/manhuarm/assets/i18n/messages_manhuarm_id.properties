font_name_title=Nama font
font_name_summary=Sesuaikan dialog dengan memilih font pilihan Anda. Untuk menerapkan perubahan ke bab yang sudah dibaca, Anda perlu menghapus cache bab di "Lainnya > Data dan penyimpanan > Hapus cache bab". Perubahan font tidak akan memengaruhi bab yang diunduh
font_name_message=Nama font diubah menjadi %s
font_name_device_title=Perangkat
font_size_title=Ukuran font
font_size_summary=Perubahan font tidak akan diterapkan pada bab yang diunduh atau disimpan di cache. Ukuran font akan disesuaikan menurut ukuran kotak dialog.
font_size_message=Ukuran font diubah menjadi %s
disable_word_break_title=Nonaktifkan pemutusan kata
disable_word_break_summary=Fitur ini mencegah kata-kata terputus secara otomatis di tengah baris.
disable_translator_title=Nonaktifkan penerjemah
disable_translator_summary=Nonaktifkan terjemahan otomatis dan aktifkan terjemahan sumber. Ini tidak berarti bahwa terjemahan tersedia. Pastikan terjemahan tersedia sebelum mengaktifkan opsi ini.
translate_dialog_box_title=Penerjemah
