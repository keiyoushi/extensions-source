dialog_box_scale_title=Skala kotak dialog
dialog_box_scale_summary=Sesuaikan ukuran kotak dialog. Ini berguna jika Anda menginginkan font yang lebih besar. Menyetel nilai lebih besar dari 1.0x akan menyebabkan teks meluap dari kotak dialog yang diharapkan
dialog_box_scale_message=Skala kotak dialog diubah menjadi %s
custom_user_agent_title=User-Agent Kustom
custom_user_agent_message=Atur User-Agent kustom untuk permintaan. Biarkan kosong untuk menggunakan default.
translate_synopsis_title=Terjemahkan sinopsis
translate_synopsis_summary=Terjemahkan deskripsi manga ke bahasa Anda secara otomatis. Ini mungkin menyebabkan sedikit penundaan saat membuka detail manga.
