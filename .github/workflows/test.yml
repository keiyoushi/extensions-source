name: Build Poseidon Scan

on:
  workflow_dispatch: # Déclenchement manuel depuis l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        # La commande cible précisément le module Poseidon Scan
        # On utilise assembleDebug pour éviter d'avoir besoin d'une clé JKS
        run: ./gradlew :src:fr:poseidonscan:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PoseidonScan-Debug-APK
          # Le chemin vers l'APK généré par Gradle
          path: src/fr/poseidonscan/build/outputs/apk/debug/*.apk
