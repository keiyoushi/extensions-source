name: Build MangaTR Extension

on:
  push:
    branches:
      - main
    paths:
      - 'src/tr/mangatr/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fix formatting
        run: ./gradlew spotlessApply

      - name: Build MangaTR debug APK
        run: ./gradlew :src:tr:mangatr:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mangatr-debug
          path: src/tr/mangatr/build/outputs/apk/debug/*.apk
          retention-days: 7
