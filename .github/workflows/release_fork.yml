name: Release APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build MangaLivre APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c

      - name: Prepare signing key
        run: echo ${{ secrets.SIGNING_KEY }} | base64 -d > signingkey.jks

      - name: Build MangaLivre
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :src:pt:mangalivre:assembleRelease

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mangalivre-test
          name: MangaLivre Test Build
          files: src/pt/mangalivre/build/outputs/apk/release/*.apk
          prerelease: true

      - name: Clean up
        run: rm signingkey.jks
