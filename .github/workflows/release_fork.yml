name: Release APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build MangaLivre APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Prepare signing key
        run: echo ${{ secrets.SIGNING_KEY }} | base64 -d > signingkey.jks

      - name: Build MangaLivre
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :src:pt:mangalivre:assembleRelease

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mangalivre-test
          name: MangaLivre Test Build
          files: src/pt/mangalivre/build/outputs/apk/release/*.apk
          prerelease: true

      - name: Clean up
        run: rm signingkey.jks
