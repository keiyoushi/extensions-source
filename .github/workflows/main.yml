name: Build Poseidon Scan APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Compilation de l'extension
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # INDISPENSABLE : Récupère tout l'historique Git pour Spotless

      - name: Configuration de Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configuration de Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compiler Poseidon Scan (Debug)
        # On ajoute "-x" pour ignorer les tests et le formatage (Spotless) qui font planter le build
        run: ./gradlew :src:fr:poseidonscans:assembleDebug -x spotlessCheck -x lint
        
      - name: Téléverser l'APK
        uses: actions/upload-artifact@v4
        with:
          name: poseidon-scan-apk
          path: "**/*.apk"
          
