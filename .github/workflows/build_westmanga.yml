name: Build WestManga APK

on:
  workflow_dispatch:
  push:
    branches:
      - fix/westmanga-domain-tv
    paths:
      - 'src/id/westmanga/**'
      - '.github/workflows/build_westmanga.yml'

permissions: {}

jobs:
  build:
    name: Build WestManga
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build WestManga debug APK
        run: |
          ./gradlew :src:id:westmanga:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: westmanga-debug-apk
          path: src/id/westmanga/build/outputs/apk/debug/*.apk
          if-no-files-found: error
