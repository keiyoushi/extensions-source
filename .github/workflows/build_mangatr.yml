name: Build MangaTR

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/tr/mangaTR/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build MangaTR
        run: ./gradlew :src:tr:mangaTR:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MangaTR-apk
          path: src/tr/mangaTR/build/outputs/apk/release/*.apk
